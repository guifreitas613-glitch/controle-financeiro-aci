        theme: {

            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],

            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',

        }
        .print-only {
          display: block !important;
        }
        .print-only-cell {
          display: table-cell !important;
        }
      }
      .print-only {
        display: none;
      }
      .print-only-cell {
        display: none;
      }
